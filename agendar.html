<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reservar Turno — BKN Barbershop</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@200;300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#0A0A0A;}
  *{box-sizing:border-box;}
  ::selection{background:#B8996A;color:#0A0A0A;}
  body{font-family:'Montserrat',sans-serif;background:#0A0A0A;color:#F0EDE8;min-height:100vh;}
  @keyframes bknFade{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:none}}
  .step-panel{animation:bknFade .4s cubic-bezier(.16,1,.3,1);}
  input:focus{outline:2px solid #B8996A;outline-offset:-2px;}
  input::placeholder{color:rgba(240,237,232,0.25);}
</style>
</head>
<body>

<!-- TOP BAR -->
<div style="position:sticky;top:0;z-index:50;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(10,10,10,0.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(200,200,200,0.08);">
  <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:rgba(240,237,232,0.6);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;">‹ Volver</a>
  <div style="display:flex;align-items:center;gap:9px;">
    <img src="assets/bkn-logo.jpg" alt="BKN" style="width:30px;height:30px;object-fit:contain;mix-blend-mode:screen;">
    <span style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:5px;color:#F0EDE8;padding-left:2px;">BKN</span>
  </div>
  <div style="width:54px;"></div>
</div>

<div style="max-width:540px;margin:0 auto;padding:26px 22px 160px;">

  <!-- HEADER -->
  <div style="margin-bottom:22px;">
    <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#B8996A;margin-bottom:10px;">Reservá tu cita</div>
    <div id="step-title" style="font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,11vw,58px);letter-spacing:2px;line-height:.9;color:#F0EDE8;">ELEGÍ TU BARBERO</div>
  </div>

  <!-- STEPPER -->
  <div id="stepper" style="display:flex;align-items:center;gap:6px;margin-bottom:30px;"></div>

  <!-- PANELS -->
  <div id="panel-1" class="step-panel"></div>
  <div id="panel-2" class="step-panel" style="display:none;"></div>
  <div id="panel-3" class="step-panel" style="display:none;"></div>
  <div id="panel-4" class="step-panel" style="display:none;"></div>

</div>

<!-- STICKY NAV -->
<div id="sticky-nav" style="position:fixed;bottom:0;left:0;right:0;z-index:60;background:linear-gradient(transparent,#0A0A0A 26%);padding:30px 22px 22px;">
  <div style="max-width:540px;margin:0 auto;display:flex;gap:10px;">
    <button id="btn-back" onclick="goBack()" style="display:none;padding:16px 22px;background:#141414;border:1px solid rgba(200,200,200,0.16);color:#C8C8C8;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;flex-shrink:0;">‹ Atrás</button>
    <button id="btn-next" onclick="goNext()" style="flex:1;padding:16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;border:none;font-weight:500;background:#1A1A1A;color:rgba(240,237,232,0.25);cursor:not-allowed;">Continuar →</button>
  </div>
</div>

<script>
const API = window.BKN_API || '';
const GOLD = '#B8996A', BLACK = '#0A0A0A';
const STRIPE = 'repeating-linear-gradient(135deg,rgba(200,200,200,0.06) 0 1px,transparent 1px 7px)';
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_SHORT = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const WK_SHORT = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
const WK_LABELS = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];

// ── State ─────────────────────────────────────────────────────────────────────
const st = { step: 1, barber: null, monthOffset: 0, selectedDate: null, selectedTime: null, service: null, phone: '', done: false };

// ── Data (loaded from API) ────────────────────────────────────────────────────
let BARBERS = [];
let SERVICES = [];

// ── Pad helper ────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,'0');

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadData(){
  try {
    const [b, s] = await Promise.all([
      fetch(API + '/api/v1/public/barbers').then(r => r.json()),
      fetch(API + '/api/v1/public/services').then(r => r.json()),
    ]);
    BARBERS = Array.isArray(b) ? b : [];
    SERVICES = Array.isArray(s) ? s : [];
  } catch(e) {
    BARBERS = [
      {id:'demo-1', name:'Marco',  bio:'Cortes de precisión, fades y diseño a mano alzada.'},
      {id:'demo-2', name:'Andrés', bio:'Barba a navaja, afeitado clásico y perfilado.'},
    ];
    SERVICES = [
      {id:'demo-1', name:'Corte Clásico',   description:'Tijera y máquina. Lavado y peinado.', price:'60000', duration_minutes:60},
      {id:'demo-2', name:'Perfilado Barba', description:'Diseño y perfilado con navaja.',        price:'40000', duration_minutes:60},
      {id:'demo-3', name:'Combo Completo',  description:'Corte + barba + tratamiento.',           price:'90000', duration_minutes:60},
      {id:'demo-4', name:'Afeitado Clásico',description:'Navaja, toalla caliente y bálsamo.',     price:'50000', duration_minutes:60},
      {id:'demo-5', name:'Diseño & Líneas', description:'Freestyle, líneas y detalles.',          price:'70000', duration_minutes:60},
    ];
  }
  render();
}

// ── Availability ─────────────────────────────────────────────────────────────
let availCache = {};
async function getAvail(barberId, dateStr){
  const key = barberId + '|' + dateStr;
  if(availCache[key]) return availCache[key];
  try {
    const data = await fetch(`${API}/api/v1/public/availability?barber_id=${barberId}&date=${dateStr}`).then(r => r.json());
    availCache[key] = Array.isArray(data) ? data.map(s => s.start_datetime.substring(11,16)) : [];
  } catch(e) {
    availCache[key] = [];
  }
  return availCache[key];
}

// ── Render stepper ────────────────────────────────────────────────────────────
function renderStepper(){
  const defs = [[1,'Barbero'],[2,'Fecha'],[3,'Servicio'],[4,'Listo']];
  document.getElementById('stepper').innerHTML = defs.map(([n, label]) => {
    const active = st.step === n, done = st.step > n;
    const barColor = (active || done) ? GOLD : 'rgba(200,200,200,0.12)';
    const numColor = (active || done) ? GOLD : 'rgba(240,237,232,0.3)';
    const lblColor = active ? 'rgba(240,237,232,0.7)' : 'rgba(240,237,232,0.3)';
    return `<div style="flex:1;display:flex;flex-direction:column;gap:7px;">
      <div style="height:3px;background:${barColor};transition:background .3s;"></div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:${numColor};">${pad(n)}</span>
        <span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:${lblColor};">${label}</span>
      </div>
    </div>`;
  }).join('');
}

// ── Render step title ─────────────────────────────────────────────────────────
const TITLES = {1:'ELEGÍ TU BARBERO',2:'ELEGÍ FECHA Y HORA',3:'ELEGÍ EL SERVICIO',4:'CONFIRMÁ TU TURNO'};
function renderTitle(){ document.getElementById('step-title').textContent = TITLES[st.step] || ''; }

// ── Nav state ─────────────────────────────────────────────────────────────────
function canContinue(){
  if(st.step === 1) return !!st.barber;
  if(st.step === 2) return !!st.selectedDate && !!st.selectedTime;
  if(st.step === 3) return st.service !== null;
  return false;
}
function updateNav(){
  const btnNext = document.getElementById('btn-next');
  const btnBack = document.getElementById('btn-back');
  const nav = document.getElementById('sticky-nav');
  if(st.done || st.step === 4){ nav.style.display = 'none'; return; }
  nav.style.display = '';
  btnBack.style.display = st.step > 1 ? '' : 'none';
  const ok = canContinue();
  const labels = {1:'Elegí fecha y hora →', 2:'Elegí el servicio →', 3:'Revisar y confirmar →'};
  btnNext.textContent = labels[st.step] || 'Continuar →';
  btnNext.style.background = ok ? GOLD : '#1A1A1A';
  btnNext.style.color = ok ? BLACK : 'rgba(240,237,232,0.25)';
  btnNext.style.cursor = ok ? 'pointer' : 'not-allowed';
}

function goBack(){ if(st.step > 1){ st.step--; render(); window.scrollTo(0,0); } }
function goNext(){ if(canContinue()){ st.step++; render(); window.scrollTo(0,0); } }

// ── Show / hide panels ────────────────────────────────────────────────────────
function showPanel(n){
  for(let i=1;i<=4;i++) document.getElementById('panel-'+i).style.display = i===n ? '' : 'none';
}

// ── STEP 1: Barbero ───────────────────────────────────────────────────────────
function renderStep1(){
  const el = document.getElementById('panel-1');
  el.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px;">` +
    BARBERS.map(b => {
      const sel = st.barber && st.barber.id === b.id;
      return `<div class="barber-card" data-id="${b.id}" data-name="${b.name}" style="padding:16px;background:${sel?'#161616':'#111111'};border:1px solid ${sel?GOLD:'rgba(200,200,200,0.08)'};cursor:pointer;transition:all .2s;">
        <div style="display:flex;gap:16px;align-items:center;">
          <div style="width:78px;height:78px;flex-shrink:0;position:relative;overflow:hidden;background:linear-gradient(155deg,#1c1c1c,#0d0d0d);border:1px solid rgba(200,200,200,0.1);">
            ${b.profile_image_url ? `<img src="${b.profile_image_url}" alt="${b.name}" style="width:100%;height:100%;object-fit:cover;">` :
              `<div style="position:absolute;inset:0;background-image:repeating-linear-gradient(135deg,rgba(200,200,200,0.04) 0 1px,transparent 1px 9px);"></div>
               <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Mono',monospace;font-size:7px;letter-spacing:1px;color:rgba(184,153,106,0.5);text-align:center;">FOTO<br>${b.name.toUpperCase()}</div>`
            }
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#F0EDE8;line-height:1;margin-bottom:6px;">${b.name}</div>
            <div style="font-size:12px;font-weight:300;color:rgba(240,237,232,0.5);line-height:1.5;">${b.bio || ''}</div>
            <div style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:${GOLD};margin-top:8px;">Disponible esta semana</div>
          </div>
          <div style="width:26px;height:26px;flex-shrink:0;border-radius:50%;border:1px solid ${sel?GOLD:'rgba(200,200,200,0.2)'};display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:${BLACK};background:${sel?GOLD:'transparent'};transition:all .2s;">${sel?'✓':''}</div>
        </div>
      </div>`;
    }).join('') + `</div>`;

  el.querySelectorAll('.barber-card').forEach(card => {
    card.addEventListener('click', () => {
      const b = BARBERS.find(x => x.id === card.dataset.id);
      st.barber = b; st.selectedTime = null; availCache = {};
      renderStep1(); updateNav();
    });
  });
}

// ── STEP 2: Fecha y hora ──────────────────────────────────────────────────────
async function renderStep2(){
  const el = document.getElementById('panel-2');
  const barberName = st.barber ? st.barber.name : '';

  const todayStr = new Date().toISOString().split('T')[0];
  const todayDt = new Date(todayStr + 'T00:00:00');
  const viewDate = new Date(todayDt.getFullYear(), todayDt.getMonth() + st.monthOffset, 1);
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  const firstDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const calBase = "aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.5px;border:1px solid transparent;transition:all .18s cubic-bezier(.16,1,.3,1);user-select:none;";

  let calDays = '';
  for(let i=0;i<firstDow;i++) calDays += `<div style="${calBase}pointer-events:none;"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt = new Date(y, m, d);
    const ds = `${y}-${pad(m+1)}-${pad(d)}`;
    const isPast = dt < todayDt, isSun = dt.getDay()===0, off = isPast||isSun;
    const isToday = ds===todayStr, sel = ds===st.selectedDate;
    let style = calBase;
    if(sel) style += `background:${GOLD};color:${BLACK};font-weight:500;cursor:pointer;`;
    else if(off) style += `color:rgba(240,237,232,0.12);background:${STRIPE};pointer-events:none;`;
    else { style += `color:rgba(240,237,232,0.62);cursor:pointer;`; if(isToday) style += `border-color:rgba(184,153,106,0.45);`; }
    calDays += `<div class="cal-day" data-date="${ds}" style="${style}" ${off?'':''}>${d}</div>`;
  }

  const prevDisabled = st.monthOffset <= 0;
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:11px;padding:13px 15px;background:#111111;border:1px solid rgba(200,200,200,0.08);margin-bottom:18px;">
      <div style="width:36px;height:36px;flex-shrink:0;background:linear-gradient(155deg,#1c1c1c,#0d0d0d);border:1px solid rgba(200,200,200,0.1);"></div>
      <div style="flex:1;"><div style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:#666;">Con</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#F0EDE8;">${barberName}</div></div>
      <button onclick="goBack()" style="background:transparent;border:1px solid rgba(200,200,200,0.16);color:rgba(240,237,232,0.6);font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:7px 12px;cursor:pointer;">Cambiar</button>
    </div>
    <div style="background:#111111;border:1px solid rgba(200,200,200,0.08);padding:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <button id="cal-prev" style="width:34px;height:34px;border:1px solid rgba(200,200,200,0.08);background:transparent;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;${prevDisabled?'color:rgba(240,237,232,0.15);cursor:not-allowed;':'color:#888;cursor:pointer;'}">‹</button>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#F0EDE8;">${MONTHS[m]} ${y}</span>
        <button id="cal-next" style="width:34px;height:34px;border:1px solid rgba(200,200,200,0.08);background:transparent;color:#888;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:7px;">${WK_LABELS.map(w=>`<div style="font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;color:rgba(102,102,102,0.6);text-align:center;padding:3px 0;">${w}</div>`).join('')}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">${calDays}</div>
      <div id="time-slots-wrap" style="margin-top:18px;border-top:1px solid rgba(200,200,200,0.08);padding-top:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#666;">Horarios de ${barberName}</span>
          <span style="font-family:'DM Mono',monospace;font-size:7px;letter-spacing:1px;color:#666;display:flex;align-items:center;gap:5px;"><span style="width:8px;height:8px;background:${STRIPE};display:inline-block;"></span>OCUPADO</span>
        </div>
        <div id="time-slots" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;"><div style="font-family:'DM Mono',monospace;font-size:9px;color:#666;text-align:center;padding:20px;grid-column:1/-1;">Elegí una fecha primero</div></div>
      </div>
    </div>`;

  el.querySelector('#cal-prev').addEventListener('click', () => { if(st.monthOffset>0){ st.monthOffset--; renderStep2(); } });
  el.querySelector('#cal-next').addEventListener('click', () => { st.monthOffset++; renderStep2(); });
  el.querySelectorAll('.cal-day').forEach(d => {
    d.addEventListener('click', async () => {
      st.selectedDate = d.dataset.date; st.selectedTime = null;
      updateNav(); await loadTimeSlots(d.dataset.date);
    });
  });

  if(st.selectedDate) await loadTimeSlots(st.selectedDate);
}

async function loadTimeSlots(dateStr){
  const wrap = document.getElementById('time-slots');
  if(!wrap) return;
  wrap.innerHTML = `<div style="font-family:'DM Mono',monospace;font-size:9px;color:#666;text-align:center;padding:20px;grid-column:1/-1;">Cargando...</div>`;
  const available = await getAvail(st.barber.id, dateStr);
  const slotBase = "padding:13px 6px;text-align:center;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;border:1px solid rgba(200,200,200,0.08);transition:all .18s;";
  if(!available.length){
    wrap.innerHTML = `<div style="font-family:'DM Mono',monospace;font-size:9px;color:#666;text-align:center;padding:20px;grid-column:1/-1;">Sin disponibilidad este día</div>`;
    return;
  }
  wrap.innerHTML = available.map(t => {
    const sel = st.selectedTime === t;
    const style = slotBase + (sel ? `background:${GOLD};color:${BLACK};border-color:${GOLD};font-weight:500;cursor:pointer;` : `color:rgba(240,237,232,0.6);cursor:pointer;`);
    return `<div class="time-slot" data-time="${t}" style="${style}">${t}</div>`;
  }).join('');
  wrap.querySelectorAll('.time-slot').forEach(slot => {
    slot.addEventListener('click', () => {
      st.selectedTime = st.selectedTime === slot.dataset.time ? null : slot.dataset.time;
      updateNav(); loadTimeSlots(dateStr);
    });
  });
}

// ── STEP 3: Servicio ──────────────────────────────────────────────────────────
function renderStep3(){
  const el = document.getElementById('panel-3');
  el.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px;">` +
    SERVICES.map((s, i) => {
      const sel = st.service === i;
      const price = parseFloat(s.price).toLocaleString('es-PY') + ' Gs';
      return `<div class="svc-card" data-i="${i}" style="padding:16px;background:${sel?'#161616':'#111111'};border:1px solid ${sel?GOLD:'rgba(200,200,200,0.08)'};cursor:pointer;transition:all .2s;">
        <div style="display:flex;align-items:center;gap:14px;">
          <div style="width:18px;height:18px;border-radius:50%;flex-shrink:0;border:1px solid ${sel?GOLD:'rgba(200,200,200,0.22)'};background:${sel?`radial-gradient(circle at center,${GOLD} 0 40%,transparent 46%)`:'transparent'};transition:all .2s;"></div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#F0EDE8;margin-bottom:2px;">${s.name}</div>
            <div style="font-size:11px;font-weight:300;color:#666;line-height:1.4;">${s.description || ''}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:${GOLD};line-height:1;">${price}</div>
            <div style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:#666;margin-top:4px;">${s.duration_minutes} MIN</div>
          </div>
        </div>
      </div>`;
    }).join('') + `</div>`;
  el.querySelectorAll('.svc-card').forEach(card => {
    card.addEventListener('click', () => { st.service = +card.dataset.i; renderStep3(); updateNav(); });
  });
}

// ── STEP 4: Confirmar ─────────────────────────────────────────────────────────
function renderStep4(){
  const el = document.getElementById('panel-4');
  if(st.done){ renderDone(el); return; }
  const barberName = st.barber ? st.barber.name : '—';
  const svc = st.service !== null ? SERVICES[st.service] : null;
  let dateLabel = '—';
  if(st.selectedDate){ const d = new Date(st.selectedDate + 'T00:00:00'); dateLabel = `${WK_SHORT[d.getDay()]} ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`; }
  const svcPrice = svc ? parseFloat(svc.price).toLocaleString('es-PY') + ' Gs' : '—';
  const summaryRows = [
    {k:'Barbero', v: barberName, vStyle:"font-size:13px;font-weight:400;color:#F0EDE8;text-align:right;"},
    {k:'Fecha', v: dateLabel, vStyle:"font-size:13px;font-weight:400;color:#F0EDE8;text-align:right;"},
    {k:'Hora', v: st.selectedTime ? st.selectedTime + ' hs' : '—', vStyle:"font-size:13px;font-weight:400;color:#F0EDE8;text-align:right;"},
    {k:'Servicio', v: svc ? svc.name : '—', vStyle:"font-size:13px;font-weight:400;color:#F0EDE8;text-align:right;"},
    {k:'Precio', v: svcPrice, vStyle:`font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:${GOLD};`},
  ];
  const phoneOk = st.phone.replace(/\D/g,'').length >= 8;
  const btnStyle = `width:100%;padding:17px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;border:none;font-weight:500;transition:all .2s;${phoneOk?`background:${GOLD};color:${BLACK};cursor:pointer;`:'background:#1A1A1A;color:rgba(240,237,232,0.25);cursor:not-allowed;'}`;

  el.innerHTML = `
    <div style="background:#111111;border:1px solid rgba(200,200,200,0.08);margin-bottom:20px;">
      <div style="background:#1A1A1A;padding:14px 16px;border-bottom:1px solid rgba(200,200,200,0.08);font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;color:#F0EDE8;">RESUMEN DE TU TURNO</div>
      ${summaryRows.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(200,200,200,0.06);">
        <span style="font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:#666;">${r.k}</span>
        <span style="${r.vStyle}">${r.v}</span>
      </div>`).join('')}
    </div>
    <div id="booking-error" style="display:none;margin-bottom:16px;padding:14px;background:rgba(212,104,95,0.1);border:1px solid rgba(212,104,95,0.3);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:#d4685f;"></div>
    <div style="margin-bottom:8px;font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:#666;">Tu Nombre</div>
    <input id="input-name" value="${st.clientName||''}" placeholder="Tu nombre completo" style="width:100%;padding:15px 16px;background:#0E0E0E;border:1px solid rgba(200,200,200,0.12);color:#F0EDE8;font-family:'DM Mono',monospace;font-size:13px;letter-spacing:1px;margin-bottom:16px;" />
    <div style="margin-bottom:8px;font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:#666;">Tu WhatsApp</div>
    <input id="input-phone" type="tel" inputmode="tel" value="${st.phone}" placeholder="+595 9XX XXX XXX" style="width:100%;padding:15px 16px;background:#0E0E0E;border:1px solid rgba(200,200,200,0.12);color:#F0EDE8;font-family:'DM Mono',monospace;font-size:13px;letter-spacing:1px;margin-bottom:6px;" />
    <div style="font-size:11px;font-weight:300;color:rgba(240,237,232,0.35);line-height:1.6;margin-bottom:20px;">Lo usamos solo para confirmar el turno y avisarte si hay cambios.</div>
    <button id="confirm-btn" style="${btnStyle}">${phoneOk ? 'Confirmar Reserva →' : 'Ingresá tu WhatsApp'}</button>`;

  el.querySelector('#input-name').addEventListener('input', e => { st.clientName = e.target.value; });
  el.querySelector('#input-phone').addEventListener('input', e => { st.phone = e.target.value; renderStep4(); });
  el.querySelector('#confirm-btn').addEventListener('click', () => {
    if(st.phone.replace(/\D/g,'').length >= 8 && st.clientName && st.clientName.trim()) submitBooking();
  });
}

async function submitBooking(){
  const btn = document.getElementById('confirm-btn');
  const errEl = document.getElementById('booking-error');
  btn.textContent = 'Reservando...'; btn.disabled = true;
  errEl.style.display = 'none';

  const svc = SERVICES[st.service];
  const startISO = `${st.selectedDate}T${st.selectedTime}:00-04:00`;

  try {
    if(st.barber.id.startsWith('demo')){
      // demo mode: skip API
      await new Promise(r => setTimeout(r, 800));
      st.done = true; renderDone(document.getElementById('panel-4'));
      document.getElementById('sticky-nav').style.display = 'none';
      return;
    }
    const res = await fetch(API + '/api/v1/public/appointments', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        barber_id: st.barber.id,
        service_id: svc.id,
        client_name: st.clientName.trim(),
        client_phone: st.phone.trim(),
        start_datetime: startISO,
      }),
    });
    if(!res.ok){
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Error al reservar');
    }
    st.done = true;
    renderDone(document.getElementById('panel-4'));
    document.getElementById('sticky-nav').style.display = 'none';
  } catch(e){
    btn.textContent = 'Confirmar Reserva →'; btn.disabled = false;
    errEl.textContent = e.message || 'Error al reservar. Intenta nuevamente.';
    errEl.style.display = '';
  }
}

function renderDone(el){
  const barberName = st.barber ? st.barber.name : '—';
  const svc = st.service !== null ? SERVICES[st.service] : null;
  let dateLabel = '—';
  if(st.selectedDate){ const d = new Date(st.selectedDate + 'T00:00:00'); dateLabel = `${WK_SHORT[d.getDay()]} ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`; }
  const summaryRows = [
    {k:'Barbero', v: barberName},
    {k:'Fecha', v: dateLabel},
    {k:'Hora', v: st.selectedTime ? st.selectedTime + ' hs' : '—'},
    {k:'Servicio', v: svc ? svc.name : '—'},
  ];
  const waText = encodeURIComponent(`Hola BKN! Confirmé mi turno:\nBarbero: ${barberName}\nFecha: ${dateLabel} a las ${st.selectedTime} hs\nServicio: ${svc ? svc.name : ''}\nNombre: ${st.clientName||''}`);
  el.innerHTML = `
    <div style="text-align:center;padding:30px 10px 0;">
      <div style="width:60px;height:60px;border:1px solid ${GOLD};border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-family:'Bebas Neue',sans-serif;font-size:32px;color:${GOLD};">✓</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;color:#F0EDE8;margin-bottom:10px;">¡TURNO RESERVADO!</div>
      <div style="font-size:13px;font-weight:300;color:rgba(240,237,232,0.5);line-height:1.7;max-width:320px;margin:0 auto 26px;">Te contactamos por WhatsApp para confirmar. Si surge un cambio te enviamos un link para reprogramar al instante.</div>
      <div style="background:#111111;border:1px solid rgba(200,200,200,0.08);text-align:left;margin-bottom:24px;">
        ${summaryRows.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid rgba(200,200,200,0.06);">
          <span style="font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:#666;">${r.k}</span>
          <span style="font-size:13px;font-weight:400;color:#F0EDE8;">${r.v}</span>
        </div>`).join('')}
      </div>
      <a href="https://wa.me/595981000000?text=${waText}" target="_blank" rel="noopener" style="display:block;width:100%;padding:16px;background:#25D366;color:${BLACK};font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;font-weight:500;margin-bottom:8px;">Confirmar por WhatsApp</a>
      <a href="index.html" style="display:block;width:100%;padding:14px;background:transparent;color:rgba(240,237,232,0.5);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border:1px solid rgba(200,200,200,0.12);">Volver al inicio</a>
    </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
async function render(){
  renderTitle();
  renderStepper();
  showPanel(st.step);
  if(st.step === 1) renderStep1();
  else if(st.step === 2) await renderStep2();
  else if(st.step === 3) renderStep3();
  else if(st.step === 4) renderStep4();
  updateNav();
}

loadData();
</script>
</body>
</html>
