version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        python seed.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bkn
      POSTGRES_PASSWORD: bkn_secret
      POSTGRES_DB: bkndb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bkn -d bkndb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
